
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>퀴즈 놀이터 v2</title>
<style>
body{margin:0;font-family:Arial;background:#eef8ff}
.wrap{display:flex;height:100vh}
.left{width:25%;background:#fff3a8;padding:12px;overflow:auto}
.right{width:75%;padding:16px;overflow:auto}
.card{background:#fff;border-radius:16px;padding:12px;margin:10px 0}
button{padding:10px 16px;border:none;border-radius:12px;background:#7ec8ff;margin:4px;cursor:pointer}
input,select{width:100%;padding:8px;margin:4px 0}
</style>
</head>
<body>
<div class="wrap">
<div class="left">
<h2>🏆 참여 현황</h2>
<div id="rank"></div>
</div>
<div class="right">
<h1>🐰 퀴즈 놀이터</h1>
<div id="home" class="card"></div>
<div id="creator" class="card" style="display:none"></div>
<div id="player" class="card" style="display:none"></div>
<div id="result" class="card" style="display:none"></div>
</div>
</div>

<script>
let participants=JSON.parse(localStorage.getItem("participants")||"[]");
let quiz=JSON.parse(localStorage.getItem("quizData")||"null");

function ranks(){
 participants.sort((a,b)=>b.score-a.score);
 document.getElementById("rank").innerHTML=participants.map((p,i)=>`${i+1}위 ${p.name} (${p.score}점)`).join("<br>");
 localStorage.setItem("participants",JSON.stringify(participants));
}
ranks();

function showHome(){
 let h=document.getElementById("home");
 if(quiz){
   h.innerHTML=`
   <h3>📚 저장된 퀴즈가 있어요!</h3>
   <button onclick="playQuiz()">퀴즈 이어하기</button>
   <button onclick="newQuiz()">새 퀴즈 만들기</button>
   <button onclick="resetAll()">모든 데이터 삭제</button>`;
 }else{
   h.innerHTML=`<button onclick="newQuiz()">새 퀴즈 만들기</button>`;
 }
}
showHome();

function resetAll(){
 if(confirm("퀴즈와 기록을 모두 삭제할까요?")){
   localStorage.removeItem("quizData");
   localStorage.removeItem("participants");
   location.reload();
 }
}

function newQuiz(){
 document.getElementById("home").style.display="none";
 let c=document.getElementById("creator");
 c.style.display="block";
 c.innerHTML=`
 <h2>출제하기</h2>
 <div id="qs"></div>
 <button onclick="addQ()">문제 추가</button>
 <button onclick="saveQuiz()">퀴즈 저장</button>`;
}

function addQ(){
 let area=document.getElementById("qs");
 if(area.children.length>=5){alert("최대 5문제");return;}
 let d=document.createElement("div");
 d.className="card";
 d.innerHTML=`
 <select class="type">
 <option value="ox">OX</option>
 <option value="choice">선택형</option>
 <option value="short">주관식</option>
 </select>
 <input class="q" placeholder="문제">
 <input class="a" placeholder="정답">
 <input class="h" placeholder="힌트(주관식 선택)">`;
 area.appendChild(d);
}

function saveQuiz(){
 let data=[];
 document.querySelectorAll("#qs .card").forEach(x=>{
   data.push({
     type:x.querySelector(".type").value,
     q:x.querySelector(".q").value,
     answer:x.querySelector(".a").value,
     hint:x.querySelector(".h").value
   });
 });
 localStorage.setItem("quizData",JSON.stringify(data));
 alert("저장 완료!");
 location.reload();
}

function playQuiz(){
 document.getElementById("home").style.display="none";
 let p=document.getElementById("player");
 p.style.display="block";
 let h=`<input id="name" placeholder="이름">`;
 quiz.forEach((q,i)=>{
   h+=`<div class='card'><b>${i+1}. ${q.q}</b><br>`;
   if(q.type==="ox"){
      h+=`<input name='q${i}' placeholder='O 또는 X'>`;
   }else{
      h+=`<input name='q${i}' placeholder='답 입력'>`;
   }
   h+=`</div>`;
 });
 h+=`<button onclick="grade()">채점하기</button>`;
 p.innerHTML=h;
}

function grade(){
 let score=0;
 let per=100/quiz.length;
 let feedback="";
 quiz.forEach((q,i)=>{
   let v=document.querySelector(`[name=q${i}]`).value.trim().toLowerCase();
   let ok=v===q.answer.trim().toLowerCase();
   if(ok){score+=per;feedback+=`✅ ${i+1}번 정답<br>`;}
   else if(q.type!=="ox"){
      let retry=prompt(`다시 도전! 힌트:${q.hint||"없음"}`);
      if((retry||"").trim().toLowerCase()===q.answer.trim().toLowerCase()){
         score+=per*0.5;
         feedback+=`🌟 ${i+1}번 2차 정답<br>`;
      }else{
         feedback+=`❌ ${i+1}번 오답 (정답:${q.answer})<br>`;
      }
   }else{
      feedback+=`❌ ${i+1}번 오답 (정답:${q.answer})<br>`;
   }
 });
 score=Math.round(score);
 participants.push({name:document.getElementById("name").value||"익명",score});
 ranks();
 document.getElementById("player").style.display="none";
 document.getElementById("result").style.display="block";
 document.getElementById("result").innerHTML=`<h2>🎉 결과</h2>${score}점<br>${feedback}`;
}
</script>
</body>
</html>
