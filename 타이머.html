<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숲속 동물 친구들 타이머</title>
    <!-- Tailwind CSS 탑재 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 구글 폰트 적용 (귀여운 Gowun Dodum 사용) -->
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gowun Dodum', sans-serif;
            background-color: #f7f3e9; /* 따뜻한 크림 베이지 숲속 톤 */
            transition: background-color 0.5s ease;
        }
        /* 귀여운 바운스 애니메이션 */
        @keyframes gentle-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-6px) scale(1.02); }
        }
        @keyframes eye-blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }
        @keyframes ear-twitch {
            0%, 90%, 100% { transform: rotate(0deg); }
            93% { transform: rotate(-6deg); }
            96% { transform: rotate(6deg); }
        }
        @keyframes sleep-bubble {
            0% { transform: translate(0, 0) scale(0.6); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translate(15px, -30px) scale(1.2); opacity: 0; }
        }
        @keyframes celebratory-jump {
            0%, 100% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-25px) scale(0.95); }
            50% { transform: translateY(0) scale(1.1, 0.9); }
            70% { transform: translateY(-10px) scale(1); }
        }
        /* 긴박한 상태의 바르르 떠는 애니메이션 */
        @keyframes panic-shiver {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-2px, 1.5px) rotate(-1.5deg); }
            40% { transform: translate(1.5px, -1px) rotate(1deg); }
            60% { transform: translate(-1.5px, -1.5px) rotate(-1deg); }
            80% { transform: translate(2px, 1px) rotate(1.5deg); }
        }
        /* 10초 전 긴박할 때의 배경 깜빡임 효과 */
        @keyframes panic-bg {
            0%, 100% { background-color: #fee2e2; } /* 부드러운 빨간색 */
            50% { background-color: #f7f3e9; }
        }

        .animate-bounce-slow {
            animation: gentle-bounce 3s ease-in-out infinite;
        }
        .anim-eye {
            transform-origin: center;
            animation: eye-blink 4s infinite;
        }
        .anim-ear-left {
            transform-origin: 60px 60px;
            animation: ear-twitch 5s infinite;
        }
        .anim-ear-right {
            transform-origin: 140px 60px;
            animation: ear-twitch 5s infinite 0.5s;
        }
        .sleep-z {
            animation: sleep-bubble 3s infinite;
            transform-origin: bottom left;
        }
        .animate-happy {
            animation: celebratory-jump 1.2s ease-in-out infinite;
        }
        .animate-shiver {
            animation: panic-shiver 0.15s infinite;
        }
        .panic-background {
            animation: panic-bg 1s infinite;
        }
        
        /* 스크롤바 숨기기 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <!-- 메인 컨테이너 카드 -->
    <div class="relative w-full max-w-md bg-[#faf8f5] rounded-3xl border-4 border-[#8e7f72] p-8 shadow-[8px_8px_0px_0px_#8e7f72] flex flex-col items-center">
        
        <!-- 타이틀 데코레이션 -->
        <div class="flex items-center gap-2 mb-2">
            <span class="text-2xl">🌲</span>
            <h1 class="text-2xl font-bold text-[#5c4d41] tracking-wide">숲속 동물 친구들 타이머</h1>
            <span class="text-2xl">🐰</span>
        </div>
        <p class="text-sm text-[#a39382] mb-4">함께 집중하고 싶은 동물을 골라보세요!</p>

        <!-- 동물 캐릭터 선택 탭 -->
        <div class="flex gap-2 mb-4 bg-[#f0e6d6] p-1.5 rounded-full border-2 border-[#bfae9e] z-10">
            <button onclick="selectAnimal('bear')" id="tab-bear" class="px-4 py-1.5 rounded-full text-xs font-bold bg-[#8e7f72] text-white shadow-sm transition-all flex items-center gap-1">
                <span>🐻</span> 곰돌이
            </button>
            <button onclick="selectAnimal('bunny')" id="tab-bunny" class="px-4 py-1.5 rounded-full text-xs font-bold text-[#6d5e53] hover:bg-[#dfd3c3] transition-all flex items-center gap-1">
                <span>🐰</span> 토끼
            </button>
            <button onclick="selectAnimal('cat')" id="tab-cat" class="px-4 py-1.5 rounded-full text-xs font-bold text-[#6d5e53] hover:bg-[#dfd3c3] transition-all flex items-center gap-1">
                <span>🐱</span> 야옹이
            </button>
        </div>

        <!-- 동물 캐릭터 영역 (동적 SVG) -->
        <div class="relative w-48 h-48 mb-4 flex items-center justify-center">
            
            <!-- 잠잘 때 나오는 'Z' 말풍선 (대기/정지 상태일 때 표시) -->
            <div id="sleep-container" class="absolute top-4 right-4 pointer-events-none transition-opacity duration-300">
                <svg width="40" height="40" viewBox="0 0 40 40" class="text-[#b29f8d] font-bold fill-current">
                    <text x="5" y="35" class="sleep-z text-xl" style="animation-delay: 0s;">z</text>
                    <text x="20" y="20" class="sleep-z text-lg" style="animation-delay: 1s;">z</text>
                </svg>
            </div>

            <!-- 긴박할 때 이마에 흘리는 식은땀 방울 (10초 전 표시) -->
            <div id="sweat-container" class="absolute top-6 left-12 pointer-events-none opacity-0 transition-opacity duration-300">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" fill="#38bdf8" />
                </svg>
            </div>

            <!-- 축하 꽃가루 (종료 시 표시) -->
            <div id="celebrate-party" class="absolute inset-0 pointer-events-none hidden">
                <span class="absolute text-xl animate-bounce" style="top: 10%; left: 10%; animation-delay: 0.1s;">🌸</span>
                <span class="absolute text-xl animate-bounce" style="top: 5%; right: 15%; animation-delay: 0.3s;">✨</span>
                <span class="absolute text-xl animate-bounce" style="bottom: 20%; left: 5%; animation-delay: 0.5s;">🎉</span>
                <span class="absolute text-xl animate-bounce" style="bottom: 15%; right: 10%; animation-delay: 0.2s;">🎈</span>
            </div>

            <!-- 동물 캐릭터 본체 SVG -->
            <svg id="animal-character" viewBox="0 0 200 200" class="w-full h-full animate-bounce-slow transform transition-all duration-500">
                
                <!-- [1] 곰돌이 그룹 -->
                <g id="group-bear">
                    <!-- 귀 배경/테두리 -->
                    <circle cx="55" cy="55" r="28" fill="#a48c75" stroke="#5c4d41" stroke-width="6" class="anim-ear-left" />
                    <circle cx="55" cy="55" r="15" fill="#fca5a5" class="anim-ear-left" />
                    
                    <circle cx="145" cy="55" r="28" fill="#a48c75" stroke="#5c4d41" stroke-width="6" class="anim-ear-right" />
                    <circle cx="145" cy="55" r="15" fill="#fca5a5" class="anim-ear-right" />

                    <!-- 머리 몸통 연결 목부분 -->
                    <ellipse cx="100" cy="145" rx="40" ry="25" fill="#a48c75" stroke="#5c4d41" stroke-width="6" />
                    <!-- 얼굴 메인 구체 -->
                    <circle cx="100" cy="105" r="62" fill="#bc9f84" stroke="#5c4d41" stroke-width="6" />
                    <!-- 볼 터치 (발그레) -->
                    <circle cx="60" cy="108" r="10" fill="#f87171" opacity="0.6" />
                    <circle cx="140" cy="108" r="10" fill="#f87171" opacity="0.6" />
                    <!-- 주둥이 -->
                    <ellipse cx="100" cy="115" rx="25" ry="18" fill="#fbf7f0" stroke="#5c4d41" stroke-width="4" />
                </g>

                <!-- [2] 토끼 그룹 (기본 숨김) -->
                <g id="group-bunny" class="hidden">
                    <!-- 긴 귀 배경/테두리 -->
                    <path d="M 45 65 C 20 5, 65 5, 65 65 Z" fill="#fbf7f0" stroke="#5c4d41" stroke-width="6" class="anim-ear-left" />
                    <path d="M 50 65 C 35 20, 60 20, 60 65 Z" fill="#fca5a5" class="anim-ear-left" />

                    <path d="M 155 65 C 180 5, 135 5, 135 65 Z" fill="#fbf7f0" stroke="#5c4d41" stroke-width="6" class="anim-ear-right" />
                    <path d="M 150 65 C 165 20, 140 20, 140 65 Z" fill="#fca5a5" class="anim-ear-right" />

                    <!-- 몸통 -->
                    <ellipse cx="100" cy="145" rx="40" ry="25" fill="#fbf7f0" stroke="#5c4d41" stroke-width="6" />
                    <!-- 얼굴 -->
                    <circle cx="100" cy="105" r="62" fill="#ffffff" stroke="#5c4d41" stroke-width="6" />
                    <!-- 볼 터치 -->
                    <circle cx="60" cy="112" r="9" fill="#f87171" opacity="0.6" />
                    <circle cx="140" cy="112" r="9" fill="#f87171" opacity="0.6" />
                    <!-- 주둥이 -->
                    <ellipse cx="100" cy="118" rx="18" ry="12" fill="#fbf7f0" stroke="#5c4d41" stroke-width="4" />
                </g>

                <!-- [3] 고양이 그룹 (기본 숨김) -->
                <g id="group-cat" class="hidden">
                    <!-- 뾰족 귀 배경 -->
                    <path d="M 40 70 L 45 30 L 75 60 Z" fill="#f59e0b" stroke="#5c4d41" stroke-width="6" stroke-linejoin="round" class="anim-ear-left" />
                    <path d="M 48 65 L 52 40 L 70 58 Z" fill="#fca5a5" class="anim-ear-left" />

                    <path d="M 160 70 L 155 30 L 125 60 Z" fill="#f59e0b" stroke="#5c4d41" stroke-width="6" stroke-linejoin="round" class="anim-ear-right" />
                    <path d="M 152 65 L 148 40 L 130 58 Z" fill="#fca5a5" class="anim-ear-right" />

                    <!-- 몸통 -->
                    <ellipse cx="100" cy="145" rx="40" ry="25" fill="#f59e0b" stroke="#5c4d41" stroke-width="6" />
                    <!-- 얼굴 -->
                    <circle cx="100" cy="105" r="62" fill="#fbbf24" stroke="#5c4d41" stroke-width="6" />
                    <!-- 고양이 삼색 줄무늬 이마 데코 -->
                    <path d="M 92 46 L 92 56 M 100 46 L 100 58 M 108 46 L 108 56" stroke="#d97706" stroke-width="4" stroke-linecap="round" />
                    <!-- 수염 양옆 그리기 -->
                    <path d="M 50 112 L 35 110 M 50 117 L 32 118" stroke="#5c4d41" stroke-width="3" stroke-linecap="round" />
                    <path d="M 150 112 L 165 110 M 150 117 L 168 118" stroke="#5c4d41" stroke-width="3" stroke-linecap="round" />
                    <!-- 볼 터치 -->
                    <circle cx="62" cy="114" r="8" fill="#f87171" opacity="0.6" />
                    <circle cx="138" cy="114" r="8" fill="#f87171" opacity="0.6" />
                    <!-- 주둥이 -->
                    <ellipse cx="100" cy="120" rx="16" ry="10" fill="#fbf7f0" stroke="#5c4d41" stroke-width="3" />
                </g>

                <!-- [공용 이목구비 요소 영역] -->

                <!-- 눈썹 (기본 대기 상태) -->
                <path id="eyebrow-left" d="M 70 73 Q 80 68 85 75" stroke="#5c4d41" stroke-width="4" fill="none" stroke-linecap="round" />
                <path id="eyebrow-right" d="M 130 73 Q 120 68 115 75" stroke="#5c4d41" stroke-width="4" fill="none" stroke-linecap="round" />

                <!-- 긴박한 눈썹 (걱정스러움) -->
                <path id="eyebrow-panic-left" d="M 70 68 Q 80 75 85 71" stroke="#5c4d41" stroke-width="4" fill="none" stroke-linecap="round" class="hidden" />
                <path id="eyebrow-panic-right" d="M 130 68 Q 120 75 115 71" stroke="#5c4d41" stroke-width="4" fill="none" stroke-linecap="round" class="hidden" />

                <!-- 기본 동그란 눈 -->
                <g id="eye-l-group">
                    <circle id="eye-left" cx="78" cy="88" r="7" fill="#3a2f28" class="anim-eye" />
                    <circle id="eye-pupil-l" cx="76" cy="86" r="2.5" fill="#ffffff" />
                </g>
                <g id="eye-r-group">
                    <circle id="eye-right" cx="122" cy="88" r="7" fill="#3a2f28" class="anim-eye" />
                    <circle id="eye-pupil-r" cx="120" cy="86" r="2.5" fill="#ffffff" />
                </g>

                <!-- 감은 눈 (눈부심/수면/성공) -->
                <path id="eye-closed-left" d="M 70 88 Q 78 94 86 88" stroke="#3a2f28" stroke-width="5" fill="none" stroke-linecap="round" class="hidden" />
                <path id="eye-closed-right" d="M 114 88 Q 122 94 130 88" stroke="#3a2f28" stroke-width="5" fill="none" stroke-linecap="round" class="hidden" />

                <!-- 동공 지진 눈 (10초 전 긴박 상태일 때 사용) -->
                <g id="eye-panic-group" class="hidden">
                    <circle cx="78" cy="88" r="9" fill="#ffffff" stroke="#3a2f28" stroke-width="3" />
                    <circle cx="78" cy="88" r="3.5" fill="#ef4444" />
                    <circle cx="122" cy="88" r="9" fill="#ffffff" stroke="#3a2f28" stroke-width="3" />
                    <circle cx="122" cy="88" r="3.5" fill="#ef4444" />
                </g>

                <!-- 중앙 코 (공통 배치하되 주둥이 높이에 맞게 중심 구성) -->
                <path id="nose-element" d="M 95 109 Q 100 105 105 109 Q 100 115 95 109 Z" fill="#3a2f28" />

                <!-- 입 (기본: ㅅ 모양 귀여운 입) -->
                <path id="mouth-default" d="M 93 116 Q 100 121 100 116 Q 100 121 107 116" stroke="#3a2f28" stroke-width="3" fill="none" stroke-linecap="round" />
                
                <!-- 입 (신남/성공: 동그랗게 열린 귀여운 입) -->
                <circle id="mouth-happy" cx="100" cy="122" r="6" fill="#ef4444" stroke="#3a2f28" stroke-width="3" class="hidden" />

                <!-- 입 (긴장/패닉: 일자 입 모양) -->
                <path id="mouth-panic" d="M 91 120 Q 100 117 109 120" stroke="#3a2f28" stroke-width="4" stroke-linecap="round" fill="none" class="hidden" />
            </svg>
        </div>

        <!-- 커스텀 시간 설정 인터페이스 (대기 중에만 노출) -->
        <div id="settings-area" class="w-full flex flex-col items-center gap-4 transition-all duration-300">
            <!-- 프리셋 버튼들 -->
            <div class="flex gap-2 justify-center w-full">
                <button onclick="addMinutes(1)" class="px-3 py-1.5 rounded-full text-xs font-semibold bg-[#e8ded1] text-[#6d5e53] hover:bg-[#dfd3c3] active:scale-95 transition-all">+1분</button>
                <button onclick="addMinutes(5)" class="px-3 py-1.5 rounded-full text-xs font-semibold bg-[#e8ded1] text-[#6d5e53] hover:bg-[#dfd3c3] active:scale-95 transition-all">+5분</button>
                <button onclick="addMinutes(10)" class="px-3 py-1.5 rounded-full text-xs font-semibold bg-[#e8ded1] text-[#6d5e53] hover:bg-[#dfd3c3] active:scale-95 transition-all">+10분</button>
                <button onclick="clearTime()" class="px-3 py-1.5 rounded-full text-xs font-semibold bg-[#fcd34d] text-[#78350f] hover:bg-[#fbbf24] active:scale-95 transition-all">비우기</button>
            </div>

            <!-- 미세 설정 인풋 (스크롤 및 간편입력) -->
            <div class="flex items-center gap-2 bg-[#f0e6d6] p-3 rounded-2xl border-2 border-[#bfae9e]">
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-[#8c7a6b] font-bold">분</span>
                    <input type="number" id="minutes-input" min="0" max="99" value="00" onchange="validateInputs()" class="w-14 bg-transparent text-center text-2xl font-bold text-[#5c4d41] focus:outline-none">
                </div>
                <span class="text-xl font-bold text-[#bfae9e]">:</span>
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-[#8c7a6b] font-bold">초</span>
                    <input type="number" id="seconds-input" min="0" max="59" value="15" onchange="validateInputs()" class="w-14 bg-transparent text-center text-2xl font-bold text-[#5c4d41] focus:outline-none">
                </div>
            </div>
        </div>

        <!-- 대형 타이머 숫자 디스플레이 -->
        <div id="time-display" class="text-6xl font-bold text-[#4a3f35] my-5 font-mono tracking-wider drop-shadow-sm select-none">
            00:15
        </div>

        <!-- 컨트롤 버튼 레이아웃 -->
        <div class="flex w-full gap-4 mt-2">
            <!-- 초기화 버튼 -->
            <button id="btn-reset" onclick="resetTimer()" class="flex-1 py-4 bg-[#e5e7eb] text-[#4b5563] font-bold rounded-2xl border-b-4 border-[#9ca3af] hover:brightness-95 active:translate-y-[2px] active:border-b-2 transition-all">
                🔄 초기화
            </button>
            <!-- 시작/일시정지 버튼 토글 -->
            <button id="btn-main" onclick="toggleTimer()" class="flex-[1.5] py-4 bg-[#86efac] text-[#14532d] font-bold rounded-2xl border-b-4 border-[#22c55e] hover:brightness-95 active:translate-y-[2px] active:border-b-2 transition-all">
                🚀 시작하기
            </button>
        </div>

    </div>

    <!-- 커스텀 귀여운 다이얼로그 모달 -->
    <div id="custom-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white border-4 border-[#8e7f72] p-8 rounded-3xl max-w-sm w-full text-center shadow-xl animate-bounce-slow">
            <span class="text-5xl block mb-4" id="modal-emoji">🎉</span>
            <h3 class="text-2xl font-bold text-[#5c4d41] mb-2" id="modal-title">시간 완료!</h3>
            <p class="text-[#8c7a6b] mb-6" id="modal-desc">동물 친구와 함께 한 시간이 모두 끝났어요! 정말 최고예요!</p>
            <button onclick="closeModal()" class="w-full py-3 bg-[#fcd34d] hover:bg-[#fbbf24] text-[#78350f] font-bold rounded-2xl border-b-4 border-[#d97706] active:translate-y-[2px] active:border-b-2 transition-all">
                고마워, 친구야! 🌲
            </button>
        </div>
    </div>

    <script>
        // 전역 상태 변수들
        let totalSeconds = 15; // 기본 테스트용 15초 초기 설정
        let remainingSeconds = 15;
        let timerInterval = null;
        let isRunning = false;
        let activeAnimal = 'bear'; // bear, bunny, cat

        // 오디오 컨텍스트 (실로폰 및 긴급 비프 생성)
        let audioCtx = null;

        // DOM 요소 단축 캐싱
        const minutesInput = document.getElementById('minutes-input');
        const secondsInput = document.getElementById('seconds-input');
        const timeDisplay = document.getElementById('time-display');
        const btnMain = document.getElementById('btn-main');
        const settingsArea = document.getElementById('settings-area');
        const sleepContainer = document.getElementById('sleep-container');
        const sweatContainer = document.getElementById('sweat-container');
        const celebrateParty = document.getElementById('celebrate-party');
        const customModal = document.getElementById('custom-modal');

        // 캐릭터 파츠 셀렉터
        const animalCharacter = document.getElementById('animal-character');
        
        // 눈썹 상태 파츠
        const eyebrowLeft = document.getElementById('eyebrow-left');
        const eyebrowRight = document.getElementById('eyebrow-right');
        const eyebrowPanicLeft = document.getElementById('eyebrow-panic-left');
        const eyebrowPanicRight = document.getElementById('eyebrow-panic-right');

        // 눈 상태 파츠
        const eyeLGroup = document.getElementById('eye-l-group');
        const eyeRGroup = document.getElementById('eye-r-group');
        const eyeClosedLeft = document.getElementById('eye-closed-left');
        const eyeClosedRight = document.getElementById('eye-closed-right');
        const eyePanicGroup = document.getElementById('eye-panic-group');

        // 입 상태 파츠
        const mouthDefault = document.getElementById('mouth-default');
        const mouthHappy = document.getElementById('mouth-happy');
        const mouthPanic = document.getElementById('mouth-panic');

        // 초기 화면 설정 로드
        window.onload = () => {
            updateDisplay(totalSeconds);
        };

        // 동물 선택 변경 함수
        function selectAnimal(animalType) {
            if (isRunning) return; // 타이머 작동 중에는 교체 방지
            
            activeAnimal = animalType;

            // 모든 동물 그룹 숨김 처리
            document.getElementById('group-bear').classList.add('hidden');
            document.getElementById('group-bunny').classList.add('hidden');
            document.getElementById('group-cat').classList.add('hidden');

            // 탭 스타일 초기화
            const tabs = ['bear', 'bunny', 'cat'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = "px-4 py-1.5 rounded-full text-xs font-bold text-[#6d5e53] hover:bg-[#dfd3c3] transition-all flex items-center gap-1";
            });

            // 선택된 그룹만 활성화 및 탭 하이라이트
            document.getElementById(`group-${animalType}`).classList.remove('hidden');
            const activeBtn = document.getElementById(`tab-${animalType}`);
            activeBtn.className = "px-4 py-1.5 rounded-full text-xs font-bold bg-[#8e7f72] text-white shadow-sm transition-all flex items-center gap-1";

            playSoftPop();
        }

        // 입력값 변경 시 유효성 검사 및 디스플레이 실시간 싱크
        function validateInputs() {
            let mins = parseInt(minutesInput.value) || 0;
            let secs = parseInt(secondsInput.value) || 0;

            if (mins < 0) mins = 0;
            if (mins > 99) mins = 99;
            if (secs < 0) secs = 0;
            if (secs > 59) {
                mins += Math.floor(secs / 60);
                secs = secs % 60;
            }

            minutesInput.value = String(mins).padStart(2, '0');
            secondsInput.value = String(secs).padStart(2, '0');

            totalSeconds = (mins * 60) + secs;
            remainingSeconds = totalSeconds;
            updateDisplay(remainingSeconds);
        }

        // 퀵 프리셋 버튼 클릭 이벤트 처리
        function addMinutes(mins) {
            let currentMins = parseInt(minutesInput.value) || 0;
            currentMins += mins;
            if (currentMins > 99) currentMins = 99;
            minutesInput.value = String(currentMins).padStart(2, '0');
            validateInputs();
            playSoftPop();
        }

        // 비우기 버튼
        function clearTime() {
            minutesInput.value = "00";
            secondsInput.value = "00";
            validateInputs();
            playSoftPop();
        }

        // 디스플레이 텍스트 업데이트
        function updateDisplay(secs) {
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            timeDisplay.textContent = `${m}:${s}`;
        }

        // 동물 상태별 디자인 전환 핵심 시스템 (눈썹, 눈, 입, 애니메이션)
        function setAnimalState(state) {
            // 모든 특수 표정 파츠 초기화
            eyebrowLeft.classList.remove('hidden');
            eyebrowRight.classList.remove('hidden');
            eyebrowPanicLeft.classList.add('hidden');
            eyebrowPanicRight.classList.add('hidden');

            eyeLGroup.classList.remove('hidden');
            eyeRGroup.classList.remove('hidden');
            eyeClosedLeft.classList.add('hidden');
            eyeClosedRight.classList.add('hidden');
            eyePanicGroup.classList.add('hidden');

            mouthDefault.classList.remove('hidden');
            mouthHappy.classList.add('hidden');
            mouthPanic.classList.add('hidden');

            animalCharacter.classList.remove('animate-happy', 'animate-shiver');
            sleepContainer.style.opacity = '0';
            sweatContainer.style.opacity = '0';
            celebrateParty.classList.add('hidden');
            document.body.classList.remove('panic-background');

            switch (state) {
                case 'idle':
                    // 쿨쿨 잠자는 상태
                    sleepContainer.style.opacity = '1';
                    break;
                case 'running':
                    // 열심히 초집중하는 표정
                    break;
                case 'paused':
                    // 편안하게 감은 눈
                    eyeLGroup.classList.add('hidden');
                    eyeRGroup.classList.add('hidden');
                    eyeClosedLeft.classList.remove('hidden');
                    eyeClosedRight.classList.remove('hidden');
                    break;
                case 'panic':
                    // 10초 미만 긴박 상태 (동공지진, 걱정눈썹, 일자 입, 바르르 떪, 땀방울 출현)
                    eyebrowLeft.classList.add('hidden');
                    eyebrowRight.classList.add('hidden');
                    eyebrowPanicLeft.classList.remove('hidden');
                    eyebrowPanicRight.classList.remove('hidden');

                    eyeLGroup.classList.add('hidden');
                    eyeRGroup.classList.add('hidden');
                    eyePanicGroup.classList.remove('hidden');

                    mouthDefault.classList.add('hidden');
                    mouthPanic.classList.remove('hidden');

                    animalCharacter.classList.add('animate-shiver');
                    sweatContainer.style.opacity = '1';
                    document.body.classList.add('panic-background');
                    break;
                case 'completed':
                    // 축하 댄스 점프 표정
                    eyeLGroup.classList.add('hidden');
                    eyeRGroup.classList.add('hidden');
                    eyeClosedLeft.classList.remove('hidden');
                    eyeClosedRight.classList.remove('hidden');
                    mouthDefault.classList.add('hidden');
                    mouthHappy.classList.remove('hidden');
                    animalCharacter.classList.add('animate-happy');
                    celebrateParty.classList.remove('hidden');
                    break;
            }
        }

        // 메인 토글 버튼
        function toggleTimer() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (!isRunning) {
                const mins = parseInt(minutesInput.value) || 0;
                const secs = parseInt(secondsInput.value) || 0;
                const targetTime = (mins * 60) + secs;

                if (targetTime <= 0) {
                    playBuzz();
                    return;
                }

                if (remainingSeconds <= 0 || remainingSeconds === totalSeconds) {
                    totalSeconds = targetTime;
                    remainingSeconds = targetTime;
                }

                isRunning = true;
                settingsArea.classList.add('opacity-30', 'pointer-events-none');
                
                btnMain.textContent = "⏸️ 일시정지";
                btnMain.classList.remove('bg-[#86efac]', 'border-[#22c55e]', 'text-[#14532d]');
                btnMain.classList.add('bg-[#fde047]', 'border-[#eab308]', 'text-[#713f12]');

                // 10초 이내 상태 진입 시 즉시 패닉 표정 동기화
                if (remainingSeconds <= 10) {
                    setAnimalState('panic');
                } else {
                    setAnimalState('running');
                }

                timerInterval = setInterval(() => {
                    if (remainingSeconds > 0) {
                        remainingSeconds--;
                        updateDisplay(remainingSeconds);

                        // 10초 남았을 때 특수 경보 연출
                        if (remainingSeconds <= 10 && remainingSeconds > 0) {
                            setAnimalState('panic');
                            playPanicBeep();
                        }
                    } else {
                        triggerFinish();
                    }
                }, 1000);

            } else {
                pauseTimer();
            }
        }

        // 일시정지
        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            btnMain.textContent = "🚀 계속하기";
            btnMain.classList.remove('bg-[#fde047]', 'border-[#eab308]', 'text-[#713f12]');
            btnMain.classList.add('bg-[#86efac]', 'border-[#22c55e]', 'text-[#14532d]');
            setAnimalState('paused');
        }

        // 초기화
        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            
            settingsArea.classList.remove('opacity-30', 'pointer-events-none');
            
            const mins = parseInt(minutesInput.value) || 0;
            const secs = parseInt(secondsInput.value) || 0;
            totalSeconds = (mins * 60) + secs;
            remainingSeconds = totalSeconds;
            
            updateDisplay(remainingSeconds);

            btnMain.textContent = "🚀 시작하기";
            btnMain.classList.remove('bg-[#fde047]', 'border-[#eab308]', 'text-[#713f12]');
            btnMain.classList.add('bg-[#86efac]', 'border-[#22c55e]', 'text-[#14532d]');

            setAnimalState('idle');
            playSoftPop();
        }

        // 종료 트리거
        function triggerFinish() {
            clearInterval(timerInterval);
            isRunning = false;
            remainingSeconds = 0;
            updateDisplay(0);

            setAnimalState('completed');
            playMelody();

            // 모달 안 캐릭터 정보 맞춤 커스텀
            const modalEmoji = document.getElementById('modal-emoji');
            const modalTitle = document.getElementById('modal-title');
            const modalDesc = document.getElementById('modal-desc');

            if (activeAnimal === 'bear') {
                modalEmoji.textContent = "🐻";
                modalTitle.textContent = "곰돌이 시간 완료!";
                modalDesc.textContent = "곰돌이가 졸음을 참고 기뻐하며 춤추고 있어요! 정말 대단해요!";
            } else if (activeAnimal === 'bunny') {
                modalEmoji.textContent = "🐰";
                modalTitle.textContent = "토끼의 당근 득템!";
                modalDesc.textContent = "토끼가 폴짝폴짝 뛰어놀며 좋아하고 있어요! 집중 성공!";
            } else {
                modalEmoji.textContent = "🐱";
                modalTitle.textContent = "야옹이의 골골송!";
                modalDesc.textContent = "야옹이가 만족해서 꼬리를 흔들고 있네요! 수고하셨어요!";
            }

            customModal.classList.remove('hidden');
        }

        function closeModal() {
            customModal.classList.add('hidden');
            resetTimer();
        }

        /* --- WEB AUDIO API 사운드 생성기 --- */

        // 부드러운 UI 팝 사운드
        function playSoftPop() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(550, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.1);

            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 경고 실패 부저 사운드
        function playBuzz() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(170, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // 10초 이내 긴박한 고음 더블 비프음
        function playPanicBeep() {
            if (!audioCtx) return;
            
            // 첫 번째 짹 사운드
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'triangle';
            osc1.frequency.setValueAtTime(987.77, audioCtx.currentTime); // 시(B5)
            gain1.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.08);

            // 두 번째 조금 더 높은 짹 사운드 (0.1초 뒤 발음)
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(1174.66, audioCtx.currentTime + 0.1); // 레(D6)
            gain2.gain.setValueAtTime(0.08, audioCtx.currentTime + 0.1);
            gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start(audioCtx.currentTime + 0.1);
            osc2.stop(audioCtx.currentTime + 0.18);
        }

        // 타이머 완료 시 아름다운 오르골 화음 사운드
        function playMelody() {
            if (!audioCtx) return;
            const notes = [523.25, 659.25, 783.99, 987.77, 1046.50]; // 도(C5), 미(E5), 솔(G5), 시(B5), 도(C6)
            const timing = [0, 0.12, 0.24, 0.36, 0.48];

            notes.forEach((freq, idx) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + timing[idx]);
                
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime + timing[idx]);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + timing[idx] + 0.45);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(audioCtx.currentTime + timing[idx]);
                osc.stop(audioCtx.currentTime + timing[idx] + 0.45);
            });
        }
    </script>
